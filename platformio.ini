; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; partition location: C:\Users\tdaams\.platformio\packages\framework-arduinoespressif32\tools\partitions

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
	ottowinter/ESPAsyncWebServer-esphome@^3.0.0
	esphome/AsyncTCP-esphome@^2.0.0
	nailbuster/ESP8266FtpServer@^1.0.1
	bblanchon/ArduinoJson@^6.20.0
	wollewald/MPU9250_WE@^1.2.6
	bbx10/DNSServer@^1.1.0
	tinyu-zhao/TinyGPSPlus-ESP32@^0.0.2
lib_ldf_mode = deep
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB
board_build.partitions = default_16MB_ori.csv
monitor_speed = 115200
upload_port = COM13
