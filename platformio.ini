; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_ldf_mode = deep
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB
board_build.partitions = Hapticap_16MB.csv
board_build.filesystem = littlefs
build_flags = 
	-DASYNCWEBSERVER_REGEX
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
monitor_speed = 115200
; Do not hardcode a Windows COM port in a Linux workspace.
; Leave auto-detect enabled, or uncomment one of the examples below.
; upload_port = /dev/ttyUSB0
; monitor_port = /dev/ttyUSB0
lib_deps = 
	ESP32Async/AsyncTCP@^3.3.2
	ESP32Async/ESPAsyncWebServer@^3.6.0
	tinyu-zhao/TinyGPSPlus-ESP32@^0.0.2
	bblanchon/ArduinoJson@^7.0.3
	aster94/SensorFusion@^1.0.6
	ayushsharma82/ElegantOTA@^3.1.0
	adafruit/Adafruit Unified Sensor@^1.1.14
	adafruit/Adafruit LIS3MDL@^1.2.4
	adafruit/Adafruit Sensor Calibration@^1.1.5
	adafruit/Adafruit LSM6DS@^4.7.2
lib_ignore =
	ESPAsyncWebServer-esphome
	AsyncTCP-esphome
